name: Test
on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:

jobs:
  perl:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            sudo: sudo
            perl-sudo-flag: --sudo
            curl: curl
          - os: windows-latest
            curl-executable: curl.exe
      fail-fast: false
    name: Perl
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    if: contains(github.event_name, 'pull_request') || github.event_name == 'push'
    steps:
    - name: checkout-merge
      if: contains(github.event_name, 'pull_request')
      uses: actions/checkout@v4
      with:
        ref: refs/pull/${{github.event.pull_request.number}}/merge
    - name: checkout
      if: github.event_name == 'push'
      uses: actions/checkout@v4
    - name: perl configuration
      id: perl-config
      shell: bash
      env:
        windows_modules: ${{ runner.os == 'Windows' && 'ExtUtils::Manifest' || ''}}
      run: |
        perl_modules="$(
          echo "
          $windows_modules
          Module::Build::Tiny
          Devel::Cover
          Devel::Cover::Report::Html
          Capture::Tiny
          Hash::Merge
          Text::Hunspell
          " |sort|xargs)"
        (
          echo "perl-modules=$perl_modules"
        ) >> "$GITHUB_OUTPUT"
    - name: test
      id: test
      shell: bash
      env:
        required_perl_modules: ${{ steps.perl-config.outputs.perl-modules }}
        GH_TOKEN: ${{ github.token }}
        PERL_SUDO_FLAG: ${{ matrix.perl-sudo-flag }}
        SUDO: ${{ matrix.sudo }}
        CURL: ${{ matrix.curl-executable }}
      run: |
        PATH="$PATH":~/go/bin
        mkdir -p ~/go/bin
        perl_env=$(mktemp)
        export_perl_env=$(mktemp)
        build_perl_env() {
          cat > "$perl_env" <<EOF
        PATH=~/perl5/bin"${PATH+:}${PATH}"
        PERL5LIB=~/perl5/lib/perl5"${PERL5LIB+:}${PERL5LIB}"
        PERL_LOCAL_LIB_ROOT=~/perl5"${PERL_LOCAL_LIB_ROOT+:}${PERL_LOCAL_LIB_ROOT}"
        PERL_MB_OPT='--install_base "'~/perl5'"'
        PERL_MM_OPT='INSTALL_BASE='~/perl5
        EOF
          cat > "$export_perl_env" <<EOF
        export PERL5LIB
        export PERL_LOCAL_LIB_ROOT
        export PERL_MB_OPT
        export PERL_MM_OPT
        EOF
        }
        (
          set -x
          command -v apt-get >/dev/null 2>/dev/null && HAS_APT=1 || HAS_APT=
          if ! command -v cover >/dev/null 2>/dev/null; then
            if [ -n "$HAS_APT" ]; then
              APT_PACKAGES="libdevel-cover-perl $APT_PACKAGES"
            else
              required_perl_modules="$required_perl_modules Devel::Cover"
            fi
          fi
          cpan_modules=$(
            for module in $required_perl_modules; do
              perl -e "use $module; 1;" > /dev/null 2>/dev/null || echo $module
            done | xargs
          )
          command -v jd && HAS_JD=1 || HAS_JD=
          (
            if [ -z "$HAS_JD" ]; then
              JD_BIN=~/go/bin/jd
              key_go_arch=GO"ARCH"
              key_go_os=GO"OS"
              if command -v go >/dev/null 2>/dev/null; then
                go_os=$(go env "$key_go_os")
                go_arch=$(go env "$key_go_arch")
              else
                go_os=$(uname | tr A-Z a-z)
                go_arch=$(uname -m | tr A-Z a-z)
                case "$go_arch" in
                  x86_64)
                    go_arch=amd64;;
                  aarch64)
                    go_arch=arm64;;
                esac
              fi
              ./gh-release-downloader josephburnett/jd "$JD_BIN" "$go_os" "$go_arch" ||
              echo 'Could not install jd' >&2
            fi
          ) &
          if [ -n "$HAS_APT" ] && [ -n "$cpan_modules" ]; then
            if ! find /var/lib/apt/lists/ -mindepth 1 -type f |grep -q .; then
              apt-get update -q
            fi
            debian_perl_packages=$(
              for module in $cpan_modules; do
                echo $module |
                perl -pe 'tr/A-Z/a-z/;s/::/-/g;s/$/-perl/;s/^/lib/' |
                xargs -n1 apt-cache search
              done |
              perl -pe 's/ - .*//'
            )
            if [ -n "$debian_perl_packages" ]; then
              APT_PACKAGES="$debian_perl_packages $APT_PACKAGES"
            fi
          fi
          run_apt_install() {
            if [ -n "$APT_PACKAGES" ]; then
              if ! $SUDO apt-get install -y $APT_PACKAGES; then
                $SUDO apt-get update &&
                $SUDO apt-get install -y $APT_PACKAGES
              fi
              APT_PACKAGES=''
            fi
          }
          run_apt_install
          get_cpan_modules() {
            for module in $required_perl_modules; do
              if ! perl -e "use $module; 1;" >&2; then
                echo $? >&2
                echo $module
              fi
            done
          }
          cpan_modules="$(get_cpan_modules)"
          if [ -n "$cpan_modules" ]; then
            has_cpanm() {
              command -v cpanm >/dev/null 2>/dev/null
            }
            if ! has_cpanm; then
              APT_PACKAGES="cpanminus $APT_PACKAGES"
              run_apt_install
            fi
            if ! has_cpanm; then
              curl -s -S -L https://cpanmin.us |
                perl - $PERL_SUDO_FLAG App::cpanminus
            fi
            build_perl_env
            . "$perl_env"
            . "$export_perl_env"

            spellchecker="$(pwd)" perl_libs="$cpan_modules" ./install-via-cpan.sh
            cpan_modules=$(get_cpan_modules)
            if [ -n "$cpan_modules" ]; then
              find $HOME/.cpanm/work
              find $HOME/.cpanm/work -name build.log |
                xargs -n1 cat
            fi
          fi
          wait
        ) > /tmp/prework || (cat /tmp/prework && false)
        COVER_BIN=$(command -v cover || true)
        echo "COVER_BIN=$COVER_BIN" >> "$GITHUB_ENV"
        if [ -s "$perl_env" ]; then
          . "$perl_env"
          . "$export_perl_env"
          cat "$perl_env" >> "$GITHUB_ENV"
        fi
        ./Build.PL
        ./Build build
        (
          cd lib;
          for m in $(
            find * -name '*.pm' |
              perl -pe 's!/!::!g;s/\.pm$//'
          ); do
            perl -I. -M$m -e ''
          done
        )
        echo '::group::cover'
        (
          echo '<details><summary>cover</summary>'
          echo
          echo '```'
        ) >> "$GITHUB_STEP_SUMMARY"
        (
          if [ -n "$COVER_BIN" ]; then
            perl "$COVER_BIN" -test 2>&1
          else
            echo '`cover` not found'
          fi
        ) | tee -a "$GITHUB_STEP_SUMMARY"
        (
          echo '```'
          echo '</details>'
        ) >> "$GITHUB_STEP_SUMMARY"
        echo ::endgroup::
    - name: calculate coverage
      id: coverage
      if: success() || failure()
      shell: bash
      run: |
        set -x
        if [ -z "$COVER_BIN" ]; then
          echo "# Cover binary not available" >> "$GITHUB_STEP_SUMMARY"
        else
          shasum=$(which shasum)
          if [ -n "$shasum" ]; then
            perl "$COVER_BIN" -ignore "$shasum" -report html
          else
            perl "$COVER_BIN" -report html
          fi
          if [ -e cover_db/coverage.html ]; then
            (
              t/html-to-markdown.pl cover_db/coverage.html
            ) >> "$GITHUB_STEP_SUMMARY"
          fi
        fi
        echo 'ran=1' >> "$GITHUB_OUTPUT"
    - name: store-coverage
      if: (success() || failure()) && (steps.coverage.outputs.ran == 1)
      uses: actions/upload-artifact@v4
      timeout-minutes: 5
      with:
        name: "check-spelling-coverage-${{ runner.os }}-${{ github.run_id }}"
        path: |
          cover_db

  standalone:
    name: Standalone
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: contains(github.event_name, 'pull_request') || github.event_name == 'push'
    steps:
    - name: checkout-merge
      if: contains(github.event_name, 'pull_request')
      uses: actions/checkout@v4
      with:
        ref: refs/pull/${{github.event.pull_request.number}}/merge
    - name: checkout
      if: github.event_name == 'push'
      uses: actions/checkout@v4
    - name: test
      id: test
      shell: bash
      run: |
        cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
        # Standalone self-test of unknown-words

        :information_source: Standalone does not have access to workflow configuration.
        As such, it doesn't know about extra dictionaries.

        EOF
        step_summary="$GITHUB_STEP_SUMMARY"
        output="$GITHUB_OUTPUT"
        for github_var in $(
          git ls-files -z |
          xargs -0 grep GITHUB_ |
          perl -pe 's/[^_A-Z]+/\n/g' |
          grep ^GITHUB_ |
          sort -u
        ); do
          eval unset $github_var
        done
        unset ACT
        export GITHUB_STEP_SUMMARY="$step_summary"
        export GITHUB_OUTPUT="$output"
        ./unknown-words.sh || true
        grep -q '@check-spelling-bot Report' "$GITHUB_STEP_SUMMARY"
    - name: upload artifact
      id: upload-artifact
      uses: actions/upload-artifact@v4
      with:
        name: standalone-artifact
        path: |
          ${{ steps.test.outputs.internal_state_directory }}
    - name: artifact note
      if: steps.upload-artifact.outcome == 'success'
      shell: bash
      run: |
        cat <<EOF >> "$GITHUB_STEP_SUMMARY"
        # apply.pl and artifact
        You should be able to use [\`apply.pl\`](https://raw.githubusercontent.com/$GITHUB_REPOSITORY/$GITHUB_SHA/apply.pl) with standalone-artifact.
        EOF
